
name: Thread-Safe Win32 AI Executor CI (CMake Edition)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows x64 Otomatik Derleme
    runs-on: windows-latest

    steps:
    - name: Kodlari Cek
      uses: actions/checkout@v4

    # 1. vcpkg ile sol2, lua ve nlohmann-json paketlerini açıkça kuruyoruz
    - name: Bağımlılıkları Kur (sol2, lua, nlohmann-json)
      run: |
        vcpkg install sol2 lua nlohmann-json --triplet x64-windows

    # 2. Lua'yı da projeye dahil eden kararlı bir CMakeLists.txt oluşturuyoruz
    - name: Geçici CMake Projesi Oluştur
      run: |
        echo "cmake_minimum_required(VERSION 3.15)" > CMakeLists.txt
        echo "project(CS2_AI_Executor LANGUAGES CXX)" >> CMakeLists.txt
        echo "set(CMAKE_CXX_STANDARD 17)" >> CMakeLists.txt
        echo "set(CMAKE_CXX_STANDARD_REQUIRED ON)" >> CMakeLists.txt
        echo "find_package(sol2 CONFIG REQUIRED)" >> CMakeLists.txt
        echo "find_package(nlohmann_json CONFIG REQUIRED)" >> CMakeLists.txt
        echo "find_package(Lua REQUIRED)" >> CMakeLists.txt
        echo "add_executable(main main.cpp)" >> CMakeLists.txt
        echo "target_include_directories(main PRIVATE \${LUA_INCLUDE_DIR})" >> >> CMakeLists.txt
        echo "target_link_libraries(main PRIVATE sol2::sol2 nlohmann_json::nlohmann_json \${LUA_LIBRARIES})" >> CMakeLists.txt
        echo "target_link_libraries(main PRIVATE wininet user32 gdi32)" >> CMakeLists.txt
      shell: bash

    # 3. CMake ile projeyi yapılandırıyoruz (vcpkg entegrasyonu otomatik yapılıyor)
    - name: CMake Yapılandırması (Configure)
      run: |
        cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows

    # 4. Projeyi Release modunda derliyoruz
    - name: Projeyi Derle (Build)
      run: |
        cmake --build build --config Release

    # 5. Oluşan kararlı EXE dosyasını artifact olarak teslim alıyoruz
    - name: Derlenen EXE Dosyasini Teslim Et (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Secure-AI-Executor
        path: build/Release/main.exe



