name: Direct C++ Code Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows x64 Saf C++ Derleme
    runs-on: windows-latest

    steps:
    - name: Kodlari Cek
      uses: actions/checkout@v4

    # MSBuild yerine doğrudan CL (Microsoft C++ Derleyicisi) ortamını çağırıyoruz
    - name: Geliştirici Komut Satırını Aç (Developer Command Prompt)
      uses: ilammy/msvc-dev-cmd@v1

    # Doğrudan main.cpp dosyasını exe haline getiriyoruz, .sln dosyasına gerek kalmıyor
    - name: main.cpp Kodunu Derle
      run: |
        cl.exe /EHsc /O2 main.cpp /link /SUBSYSTEM:WINDOWS wininet.lib user32.lib gdi32.lib
      # NOT: Eğer projedeki Sol2/Lua include hatası verirse, buraya /I kütüphane_yolu eklenebilir.

    - name: Derlenen EXE Dosyasini Teslim Et (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Direct-Executor
        path: main.exe
        
