name: Direct C++ Code Build CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows x64 Saf C++ Derleme
    runs-on: windows-latest

    steps:
    - name: Kodlari Cek
      uses: actions/checkout@v4

    # vcpkg'yi entegre kuran resmi GitHub Actions adımını çağırıyoruz
    - name: vcpkg ve Bağımlılıkları Otomatik Yapılandır
      uses: johnwason/vcpkg-action@v6
      with:
        pkgs: lua sol2
        triplet: x64-windows
        token: ${{ github.token }}

    # Geliştirici komut satırını vcpkg değişkenleriyle birlikte açıyoruz
    - name: Geliştirici Komut Satırını Aç (Developer Command Prompt)
      uses: ilammy/msvc-dev-cmd@v1

    # vcpkg_target_triplet ile derleyiciye lua.h ve sol2 klasörlerini otomatik enjekte ediyoruz
    - name: main.cpp Kodunu Derle
      run: |
        cl.exe /EHsc /O2 /std:c++17 /I"${{ env.VCPKG_ROOT }}/installed/x64-windows/include" main.cpp /link /LIBPATH:"${{ env.VCPKG_ROOT }}/installed/x64-windows/lib" lua54.lib /SUBSYSTEM:WINDOWS wininet.lib user32.lib gdi32.lib
        
    - name: Derlenen EXE Dosyasini Teslim Et (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Secure-AI-Executor
        path: main.exe
        
