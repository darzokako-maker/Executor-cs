
name: Thread-Safe Win32 AI Executor CI (CMake Edition)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Windows x64 Otomatik Derleme
    runs-on: windows-latest

    steps:
    - name: Kodlari Cek
      uses: actions/checkout@v4

    # 1. vcpkg ile sol2, lua ve nlohmann-json paketlerini kuruyoruz
    - name: Bağımlılıkları Kur (sol2, lua, nlohmann-json)
      run: |
        vcpkg install sol2 lua nlohmann-json --triplet x64-windows

    # 2. Heredoc yöntemiyle hatasız, kaçış karaktersiz CMakeLists.txt oluşturuyoruz
    - name: Geçici CMake Projesi Oluştur
      shell: bash
      run: |
        cat << 'EOF' > CMakeLists.txt
        cmake_minimum_required(VERSION 3.15)
        project(CS2_AI_Executor LANGUAGES CXX)
        
        set(CMAKE_CXX_STANDARD 17)
        set(CMAKE_CXX_STANDARD_REQUIRED ON)
        
        # Gerekli paketleri tanımlıyoruz
        find_package(sol2 CONFIG REQUIRED)
        find_package(nlohmann_json CONFIG REQUIRED)
        find_package(Lua REQUIRED)
        
        # Çalıştırılabilir dosyamızı tanımlıyoruz
        add_executable(main main.cpp)
        
        # Lua başlık dosyalarını dahil ediyoruz
        target_include_directories(main PRIVATE ${LUA_INCLUDE_DIR})
        
        # Gerekli tüm kütüphaneleri bağlıyoruz
        target_link_libraries(main PRIVATE 
            sol2::sol2 
            nlohmann_json::nlohmann_json 
            ${LUA_LIBRARIES}
            wininet 
            user32 
            gdi32
        )
        EOF

    # 3. CMake ile projeyi yapılandırıyoruz (vcpkg entegrasyonu otomatik yapılıyor)
    - name: CMake Yapılandırması (Configure)
      run: |
        cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows

    # 4. Projeyi Release modunda derliyoruz
    - name: Projeyi Derle (Build)
      run: |
        cmake --build build --config Release

    # 5. Oluşan kararlı EXE dosyasını artifact olarak teslim alıyoruz
    - name: Derlenen EXE Dosyasini Teslim Et (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Secure-AI-Executor
        path: build/Release/main.exe


