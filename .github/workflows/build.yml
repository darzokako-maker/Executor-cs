name: CS2 Fully Updated Schema Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python 3.10 Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Modulleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: PyInstaller ile Sifirdan Derleme Yap
      run: |
        pyinstaller --onefile --noconsole --name="CS2_Fully_Updated_ESP" main.py

    - name: Paket Dosyasini Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: CS2-Fully-Updated-Package
        path: dist/CS2_Fully_Updated_ESP.exe
        
